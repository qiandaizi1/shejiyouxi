<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>郑雅雯消消乐 💕</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --pink:#ff6b9d; --pink-light:#ffb3cc; --pink-pale:#fff0f5;
  --rose:#ff4d7d; --purple:#c77dff; --yellow:#ffd166;
  --mint:#06d6a0; --sky:#74b9ff; --orange:#ff9a3c; --red:#ff5252;
  --bg1:linear-gradient(145deg,#ffe0ec 0%,#fff0f5 50%,#ffe8f0 100%);
  --bg2:linear-gradient(145deg,#ffd6e7 0%,#ffe8f7 50%,#f0e0ff 100%);
  --bg3:linear-gradient(145deg,#ffc8dd 0%,#ffafcc 50%,#bde0fe 100%);
  --shadow:0 8px 32px rgba(255,107,157,0.18);
  --radius:16px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html{height:100%;}
body{
  font-family:'Nunito',sans-serif;
  min-height:100%;
  background:var(--bg1);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow-x:hidden;
  overflow-y:auto;
  position:relative;
  padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);
}

/* ===== FLOATING HEARTS BG ===== */
.hearts-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.heart-float{position:absolute;opacity:0;animation:floatHeart linear infinite;}
@keyframes floatHeart{
  0%  {transform:translateY(100vh) rotate(-10deg);opacity:0;}
  10% {opacity:0.3;}
  90% {opacity:0.15;}
  100%{transform:translateY(-120px) rotate(15deg);opacity:0;}
}

/* ===== SCREENS ===== */
#app{width:100%;max-width:480px;padding:0 8px 8px;position:relative;z-index:10;}
.screen{display:none;flex-direction:column;align-items:center;width:100%;}
.screen.active{display:flex;}

/* ===== START SCREEN ===== */
.game-title-wrap{
  text-align:center;
  padding:clamp(20px,6vh,48px) 16px clamp(14px,3vh,28px);
}
.game-title{
  font-family:'Ma Shan Zheng',cursive;
  font-size:clamp(1.8rem,8vw,3rem);
  color:var(--rose);
  text-shadow:2px 4px 12px rgba(255,77,125,0.22);
  letter-spacing:3px;line-height:1.2;
}
.game-subtitle{
  font-size:clamp(0.8rem,3.5vw,1rem);
  color:#ff8fae;margin-top:7px;font-weight:600;letter-spacing:1px;
}
.title-deco{
  font-size:clamp(1.3rem,6vw,1.8rem);
  margin:0 4px;display:inline-block;
  animation:titleBounce 1.6s ease-in-out infinite;
}
@keyframes titleBounce{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-8px) rotate(5deg);}}

.start-card{
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:var(--radius);
  padding:clamp(18px,5vw,28px) clamp(14px,4vw,24px) clamp(20px,5vw,30px);
  width:100%;box-shadow:var(--shadow);
  border:1.5px solid rgba(255,107,157,0.2);
}
.difficulty-label{
  text-align:center;color:var(--rose);
  font-weight:800;font-size:clamp(0.85rem,3.8vw,1rem);
  margin-bottom:10px;letter-spacing:1px;
}
.difficulty-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.diff-btn{
  border:none;cursor:pointer;border-radius:12px;
  padding:clamp(10px,3.5vw,14px) 4px;
  font-family:'Nunito',sans-serif;font-weight:800;
  font-size:clamp(0.75rem,3.2vw,0.88rem);
  transition:all 0.22s cubic-bezier(.34,1.56,.64,1);
}
.diff-btn:active{transform:scale(0.93)!important;}
.diff-btn.easy  {background:linear-gradient(135deg,#ff9a3c,#ffd166);color:#fff;box-shadow:0 4px 12px rgba(255,154,60,0.3);}
.diff-btn.normal{background:linear-gradient(135deg,#ff6b9d,#c77dff);color:#fff;box-shadow:0 4px 12px rgba(255,107,157,0.3);}
.diff-btn.hard  {background:linear-gradient(135deg,#ff4d7d,#ff5252);color:#fff;box-shadow:0 4px 12px rgba(255,77,125,0.3);}
.diff-btn.selected{transform:scale(1.07) translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.2)!important;}
.diff-btn .diff-icon{font-size:clamp(1.2rem,5.5vw,1.5rem);display:block;margin-bottom:3px;}
.diff-btn .diff-name{display:block;}
.diff-btn .diff-desc{display:block;font-size:clamp(0.6rem,2.3vw,0.72rem);opacity:0.85;margin-top:2px;font-weight:600;}

.start-btn{
  width:100%;padding:clamp(13px,3.8vw,16px);border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--rose),var(--pink));
  color:#fff;font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(0.95rem,4.2vw,1.1rem);border-radius:12px;
  box-shadow:0 6px 22px rgba(255,77,125,0.35);
  letter-spacing:2px;transition:all 0.2s;
}
.start-btn:active{transform:scale(0.96);}

/* ===== GAME SCREEN ===== */
#gameScreen{gap:0;}

.game-header{
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:clamp(8px,2.5vw,12px) clamp(10px,3vw,16px) clamp(7px,2vw,10px);
  border:1.5px solid rgba(255,107,157,0.18);border-bottom:none;
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.header-title{
  font-family:'Ma Shan Zheng',cursive;
  color:var(--rose);font-size:clamp(0.88rem,4.2vw,1.1rem);letter-spacing:2px;
}
.header-btns{display:flex;gap:5px;}
.hbtn{
  border:none;cursor:pointer;border-radius:8px;
  padding:clamp(5px,1.8vw,7px) clamp(8px,2.5vw,11px);
  font-family:'Nunito',sans-serif;font-size:clamp(0.65rem,2.8vw,0.76rem);font-weight:700;
  transition:all 0.15s;
}
.hbtn:active{transform:scale(0.9);}
.hbtn.home   {background:#ffe0ec;color:var(--rose);}
.hbtn.restart{background:#fff0cc;color:#d48a00;}
.hbtn.sound  {background:#e8f4ff;color:#4a9eff;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.stat-box{
  background:linear-gradient(135deg,rgba(255,107,157,0.07),rgba(255,179,204,0.11));
  border-radius:9px;padding:clamp(4px,1.8vw,7px) 2px;
  text-align:center;border:1px solid rgba(255,107,157,0.12);
}
.stat-label{font-size:clamp(0.52rem,2.2vw,0.62rem);color:#ff8fae;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
.stat-val{font-size:clamp(0.95rem,4.2vw,1.15rem);font-weight:900;color:#333;margin-top:1px;line-height:1;}
.stat-val.highlight{color:var(--rose);}

.board-wrap{
  width:100%;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-left:1.5px solid rgba(255,107,157,0.18);
  border-right:1.5px solid rgba(255,107,157,0.18);
  padding:clamp(6px,2vw,10px);
  /* Critical: disable browser scroll/zoom on the board */
  touch-action:none;
  -ms-touch-action:none;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:clamp(2px,0.7vw,4px);
  width:100%;aspect-ratio:1;
  position:relative;
  touch-action:none;
  -ms-touch-action:none;
}

.cell{
  aspect-ratio:1;
  border-radius:clamp(6px,1.8vw,11px);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(0.85rem,4.2vw,1.55rem);
  cursor:pointer;
  position:relative;
  transition:transform 0.12s cubic-bezier(.34,1.56,.64,1),box-shadow 0.12s;
  user-select:none;-webkit-user-select:none;
  touch-action:none;-ms-touch-action:none;
  background:rgba(255,255,255,0.6);
  border:1.5px solid rgba(255,255,255,0.9);
  will-change:transform;
}
/* Per-type colors */
.cell[data-type="0"]{background:linear-gradient(135deg,#ffe0ec,#ffb3cc);}
.cell[data-type="1"]{background:linear-gradient(135deg,#ffe8b0,#ffd166);}
.cell[data-type="2"]{background:linear-gradient(135deg,#c8f4e8,#a8edda);}
.cell[data-type="3"]{background:linear-gradient(135deg,#c8e8ff,#91caff);}
.cell[data-type="4"]{background:linear-gradient(135deg,#e8c8ff,#d4a0ff);}
.cell[data-type="5"]{background:linear-gradient(135deg,#ffd0b0,#ffb07a);}

.cell.selected{
  transform:scale(1.15);
  box-shadow:0 0 0 3px var(--rose),0 4px 14px rgba(255,77,125,0.38);
  z-index:4;
  animation:selectedPulse 0.6s ease-in-out infinite alternate;
}
@keyframes selectedPulse{
  from{box-shadow:0 0 0 2px var(--rose),0 4px 14px rgba(255,77,125,0.25);}
  to  {box-shadow:0 0 0 4px var(--rose),0 6px 20px rgba(255,77,125,0.48);}
}
.cell.swiping{
  transform:scale(1.12);
  box-shadow:0 0 0 2.5px var(--pink-light),0 4px 14px rgba(255,107,157,0.28);
  z-index:3;
}
.cell.eliminating{animation:elimAnim 0.42s cubic-bezier(.36,.07,.19,.97) forwards;}
@keyframes elimAnim{
  0%  {transform:scale(1);opacity:1;}
  30% {transform:scale(1.32) rotate(8deg);opacity:1;}
  100%{transform:scale(0) rotate(30deg);opacity:0;}
}
.cell.falling{animation:fallAnim 0.28s cubic-bezier(.22,.61,.36,1) forwards;}
@keyframes fallAnim{
  0%  {transform:translateY(-40px);opacity:0.3;}
  100%{transform:translateY(0);opacity:1;}
}
.cell.invalid-swap{animation:shakeAnim 0.36s ease-in-out;}
@keyframes shakeAnim{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-5px);}
  40%{transform:translateX(5px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}

.game-footer{
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:0 0 var(--radius) var(--radius);
  padding:clamp(7px,2.2vw,11px) clamp(10px,3vw,16px) clamp(9px,2.5vw,13px);
  border:1.5px solid rgba(255,107,157,0.18);border-top:none;
  text-align:center;
}
.target-text{font-size:clamp(0.72rem,3vw,0.85rem);color:#ff8fae;font-weight:700;}
.progress-bar-wrap{background:rgba(255,107,157,0.1);border-radius:999px;height:7px;margin-top:5px;overflow:hidden;}
.progress-bar{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,var(--pink),var(--rose));
  transition:width 0.4s cubic-bezier(.22,.61,.36,1);
  box-shadow:0 0 8px rgba(255,107,157,0.4);
}

/* ===== POPUPS ===== */
.love-popup{
  position:fixed;
  font-family:'Ma Shan Zheng',cursive;
  font-size:clamp(0.92rem,4.2vw,1.48rem);
  color:#fff;
  padding:7px 18px;border-radius:999px;
  background:linear-gradient(135deg,var(--rose),var(--pink));
  box-shadow:0 4px 18px rgba(255,77,125,0.4);
  pointer-events:none;z-index:999;white-space:nowrap;
  animation:lovePop 1.2s cubic-bezier(.22,.61,.36,1) forwards;
  max-width:90vw;
}
@keyframes lovePop{
  0%  {transform:translateY(0) scale(0.5);opacity:0;}
  20% {transform:translateY(-12px) scale(1.15);opacity:1;}
  60% {transform:translateY(-28px) scale(1.08);opacity:1;}
  100%{transform:translateY(-55px) scale(0.9);opacity:0;}
}
.score-pop{
  position:fixed;
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(1rem,4.5vw,1.4rem);color:var(--rose);
  pointer-events:none;z-index:998;
  text-shadow:0 2px 8px rgba(255,77,125,0.3);
  animation:scorePop 0.9s ease-out forwards;
}
@keyframes scorePop{
  0%  {transform:translateY(0) scale(0.8);opacity:1;}
  100%{transform:translateY(-42px) scale(1.1);opacity:0;}
}
.combo-pop{
  position:fixed;
  font-family:'Ma Shan Zheng',cursive;
  font-size:clamp(1.1rem,5.5vw,1.9rem);
  color:var(--yellow);
  text-shadow:0 2px 12px rgba(255,209,102,0.6);
  pointer-events:none;z-index:1000;
  animation:comboPop 1.4s cubic-bezier(.34,1.56,.64,1) forwards;
  white-space:nowrap;
}
@keyframes comboPop{
  0%  {transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0;}
  30% {transform:translate(-50%,-50%) scale(1.3) rotate(5deg);opacity:1;}
  70% {transform:translate(-50%,-50%) scale(1.1) rotate(-2deg);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(0.8) translateY(-20px);opacity:0;}
}

/* ===== MODAL ===== */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(255,200,220,0.5);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  align-items:center;justify-content:center;
  padding:16px;
}
.modal-overlay.active{display:flex;}
.modal-box{
  background:#fff;border-radius:22px;
  padding:clamp(22px,6vw,36px) clamp(18px,5vw,32px);
  width:100%;max-width:360px;
  text-align:center;
  box-shadow:0 20px 60px rgba(255,77,125,0.25);
  border:2px solid rgba(255,107,157,0.2);
  animation:modalIn 0.38s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn{from{transform:scale(0.72) translateY(38px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.modal-emoji{font-size:clamp(2.2rem,10vw,3.2rem);margin-bottom:10px;display:block;animation:modalEmojiBounce 0.8s cubic-bezier(.34,1.56,.64,1);}
@keyframes modalEmojiBounce{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0);}}
.modal-title{font-family:'Ma Shan Zheng',cursive;font-size:clamp(1.4rem,7vw,1.8rem);color:var(--rose);margin-bottom:8px;}
.modal-msg{font-size:clamp(0.82rem,3.4vw,0.95rem);color:#888;line-height:1.65;margin-bottom:18px;}
.modal-score-row{display:flex;gap:8px;justify-content:center;margin-bottom:18px;}
.modal-stat{background:var(--pink-pale);border-radius:12px;padding:9px 16px;color:var(--rose);font-weight:800;font-size:clamp(0.8rem,3.2vw,0.9rem);}
.modal-stat span{display:block;font-size:clamp(1.1rem,5.5vw,1.3rem);font-weight:900;}
.modal-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
.mbtn{
  border:none;cursor:pointer;border-radius:12px;
  padding:clamp(11px,3.2vw,13px) clamp(17px,4.5vw,22px);
  font-family:'Nunito',sans-serif;font-weight:800;
  font-size:clamp(0.83rem,3.5vw,0.92rem);
  transition:all 0.18s;
}
.mbtn:active{transform:scale(0.93);}
.mbtn.primary{background:linear-gradient(135deg,var(--rose),var(--pink));color:#fff;box-shadow:0 4px 14px rgba(255,77,125,0.3);}
.mbtn.secondary{background:#f5f5f5;color:#888;}

/* ===== FINAL SCREEN ===== */
#finalScreen{text-align:center;padding:clamp(14px,5vw,28px) 12px;}
.final-card{
  background:rgba(255,255,255,0.92);border-radius:22px;
  padding:clamp(26px,6vw,38px) clamp(18px,5vw,26px);
  box-shadow:var(--shadow);border:2px solid rgba(255,107,157,0.2);
  animation:modalIn 0.5s cubic-bezier(.34,1.56,.64,1);
}
.final-hearts{font-size:clamp(1.6rem,7vw,2.5rem);letter-spacing:3px;margin-bottom:12px;animation:titleBounce 1s ease-in-out infinite;}
.final-title{font-family:'Ma Shan Zheng',cursive;font-size:clamp(1.6rem,7.5vw,2.2rem);color:var(--rose);margin-bottom:10px;}
.final-msg{color:#888;font-size:clamp(0.83rem,3.4vw,0.96rem);line-height:1.7;margin-bottom:18px;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(560deg);opacity:0;}}
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div id="app">

<!-- ===== START SCREEN ===== -->
<div class="screen active" id="startScreen">
  <div class="game-title-wrap">
    <div class="game-title">
      <span class="title-deco">💕</span>郑雅雯消消乐<span class="title-deco">💕</span>
    </div>
    <div class="game-subtitle">消掉一格，喜欢多一分 ✨</div>
  </div>
  <div class="start-card">
    <div class="difficulty-label">💌 选择难度</div>
    <div class="difficulty-btns">
      <button class="diff-btn easy selected" data-diff="easy">
        <span class="diff-icon">🌸</span>
        <span class="diff-name">简单</span>
        <span class="diff-desc">4种方块<br>步数多</span>
      </button>
      <button class="diff-btn normal" data-diff="normal">
        <span class="diff-icon">💖</span>
        <span class="diff-name">普通</span>
        <span class="diff-desc">5种方块<br>步数中</span>
      </button>
      <button class="diff-btn hard" data-diff="hard">
        <span class="diff-icon">🔥</span>
        <span class="diff-name">困难</span>
        <span class="diff-desc">6种方块<br>步数少</span>
      </button>
    </div>
    <button class="start-btn" id="startBtn">🎮 开始游戏</button>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div class="screen" id="gameScreen">
  <div class="game-header">
    <div class="header-top">
      <div class="header-title">郑雅雯消消乐 💕</div>
      <div class="header-btns">
        <button class="hbtn sound" id="soundBtn">🔊</button>
        <button class="hbtn restart" id="restartBtn">↺ 重玩</button>
        <button class="hbtn home" id="homeBtn">🏠</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-label">关卡</div><div class="stat-val highlight" id="statLevel">1-1</div></div>
      <div class="stat-box"><div class="stat-label">分数</div><div class="stat-val" id="statScore">0</div></div>
      <div class="stat-box"><div class="stat-label">步数</div><div class="stat-val highlight" id="statSteps">15</div></div>
      <div class="stat-box"><div class="stat-label">目标</div><div class="stat-val" id="statTarget">300</div></div>
    </div>
  </div>
  <div class="board-wrap" id="boardWrap">
    <div id="board"></div>
  </div>
  <div class="game-footer">
    <div class="target-text" id="targetText">目标：300分 · 还差300分 ✨</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  </div>
</div>

<!-- ===== FINAL SCREEN ===== -->
<div class="screen" id="finalScreen">
  <div class="confetti-wrap" id="confettiWrap"></div>
  <div class="final-card">
    <div class="final-hearts">💕💖💕</div>
    <div class="final-title">郑雅雯，你是最甜的！</div>
    <div class="final-msg">
      恭喜你通关了所有关卡！<br>
      每一次消除都是一句"喜欢你"<br>
      <strong style="color:var(--rose)">郑雅雯，我爱你 ❤️</strong>
    </div>
    <div style="font-size:clamp(1rem,5.5vw,1.5rem);margin-bottom:18px">🌸🌺🌸🌺🌸</div>
    <div class="modal-btns">
      <button class="mbtn primary" id="finalRestartBtn">💕 再玩一次</button>
    </div>
  </div>
</div>

</div><!-- #app -->

<!-- ===== RESULT MODAL ===== -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-box">
    <span class="modal-emoji" id="resultEmoji">🎉</span>
    <div class="modal-title" id="resultTitle">通关成功！</div>
    <div class="modal-msg" id="resultMsg"></div>
    <div class="modal-score-row">
      <div class="modal-stat">分数<span id="resultScore">0</span></div>
      <div class="modal-stat">步数<span id="resultSteps">0</span></div>
    </div>
    <div class="modal-btns" id="resultBtns"></div>
  </div>
</div>

<script>
'use strict';
// ============================================================
//  CONFIG
// ============================================================
const BOARD_SIZE = 8;
const TILES = ['💗','⭐','🍬','🌸','💜','🍊'];

const DIFF_CONFIG = {
  easy:   { types:4, levels:[{steps:15,target:300},{steps:15,target:500},{steps:18,target:700}]  },
  normal: { types:5, levels:[{steps:12,target:400},{steps:12,target:650},{steps:15,target:900}]  },
  hard:   { types:6, levels:[{steps:10,target:500},{steps:10,target:800},{steps:12,target:1100}] }
};

const LOVE_MSGS = [
  '郑雅雯爱你','郑雅雯520','郑雅雯最甜','郑雅雯最美',
  '超喜欢郑雅雯','郑雅雯最好','郑雅雯可爱','心动郑雅雯',
  '郑雅雯贴贴','郑雅雯抱抱','郑雅雯亲亲','郑雅雯万岁',
  '每天都想你','眼里只有你','郑雅雯超甜','最爱郑雅雯'
];

const SCORE_MAP = {3:30,4:50,5:80,6:100};
const BG_VARS   = ['--bg1','--bg2','--bg3'];

// ============================================================
//  STATE
// ============================================================
let difficulty  = 'easy';
let level       = 0;
let score       = 0;
let stepsLeft   = 0;
let targetScore = 0;
let board       = [];   // 2D [r][c] = tileType (int) or -1
let selected    = null; // {r,c} for click mode
let busy        = false;
let soundOn     = true;
let comboCount  = 0;

// ============================================================
//  AUDIO — simple Web Audio beeps
// ============================================================
let audioCtx = null;
function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playBeep(freq=440,dur=0.1,type='sine',vol=0.15){
  if(!soundOn) return;
  try{
    const ctx=getAudio(), osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type=type; osc.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(); osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playMatch(n){ [523,659,784,1047].slice(0,Math.min(n-2,4)).forEach((f,i)=>setTimeout(()=>playBeep(f,0.12,'triangle',0.12),i*70)); }
function playFail()  { playBeep(220,0.3,'sawtooth',0.1); }
function playWin()   { [784,1047,1319].forEach((f,i)=>setTimeout(()=>playBeep(f,0.25,'triangle',0.15),i*120)); }
function playClick() { playBeep(660,0.06,'sine',0.08); }

// ============================================================
//  FLOATING HEARTS
// ============================================================
const HEART_EMOJIS = ['💕','💗','💖','💓','💝','🌸','✨','⭐'];
const heartsBg = document.getElementById('heartsBg');
function spawnHeart(){
  const el=document.createElement('div');
  el.className='heart-float';
  el.textContent=HEART_EMOJIS[Math.floor(Math.random()*HEART_EMOJIS.length)];
  el.style.left=Math.random()*100+'vw';
  const dur=8+Math.random()*10;
  el.style.animationDuration=dur+'s';
  el.style.animationDelay=Math.random()*dur+'s';
  el.style.fontSize=(11+Math.random()*16)+'px';
  heartsBg.appendChild(el);
  setTimeout(()=>el.remove(),(dur+2)*1000);
}
for(let i=0;i<18;i++) setTimeout(spawnHeart,i*650);
setInterval(spawnHeart,2400);

// ============================================================
//  BOARD GENERATION
// ============================================================
function numTypes(){ return DIFF_CONFIG[difficulty].types; }
function randType(){ return Math.floor(Math.random()*numTypes()); }

function initBoard(){
  board=Array.from({length:BOARD_SIZE},()=>Array(BOARD_SIZE).fill(0));
  for(let r=0;r<BOARD_SIZE;r++){
    for(let c=0;c<BOARD_SIZE;c++){
      let t,att=0;
      do{ t=randType(); att++; }while(att<20 && wouldMatch(board,r,c,t));
      board[r][c]=t;
    }
  }
}

function wouldMatch(b,r,c,t){
  if(c>=2 && b[r][c-1]===t && b[r][c-2]===t) return true;
  if(r>=2 && b[r-1][c]===t && b[r-2][c]===t) return true;
  return false;
}

// ============================================================
//  MATCH DETECTION
// ============================================================
function findMatches(){
  const matched=new Set();
  const key=(r,c)=>r*100+c;
  // horizontal
  for(let r=0;r<BOARD_SIZE;r++){
    let c=0;
    while(c<BOARD_SIZE){
      let t=board[r][c],len=1;
      while(c+len<BOARD_SIZE&&board[r][c+len]===t) len++;
      if(len>=3) for(let i=0;i<len;i++) matched.add(key(r,c+i));
      c+=len;
    }
  }
  // vertical
  for(let c=0;c<BOARD_SIZE;c++){
    let r=0;
    while(r<BOARD_SIZE){
      let t=board[r][c],len=1;
      while(r+len<BOARD_SIZE&&board[r+len][c]===t) len++;
      if(len>=3) for(let i=0;i<len;i++) matched.add(key(r+i,c));
      r+=len;
    }
  }
  return [...matched].map(k=>({r:Math.floor(k/100),c:k%100}));
}

function findGroups(){
  const g=[];
  for(let r=0;r<BOARD_SIZE;r++){
    let c=0;
    while(c<BOARD_SIZE){
      let t=board[r][c],l=1;
      while(c+l<BOARD_SIZE&&board[r][c+l]===t) l++;
      if(l>=3) g.push(l); c+=l;
    }
  }
  for(let c=0;c<BOARD_SIZE;c++){
    let r=0;
    while(r<BOARD_SIZE){
      let t=board[r][c],l=1;
      while(r+l<BOARD_SIZE&&board[r+l][c]===t) l++;
      if(l>=3) g.push(l); r+=l;
    }
  }
  return g;
}

function applyGravity(){
  for(let c=0;c<BOARD_SIZE;c++){
    let w=BOARD_SIZE-1;
    for(let r=BOARD_SIZE-1;r>=0;r--){
      if(board[r][c]!==-1){ board[w][c]=board[r][c]; if(w!==r) board[r][c]=-1; w--; }
    }
    while(w>=0) board[w--][c]=randType();
  }
}

function swapCells(r1,c1,r2,c2){ let t=board[r1][c1]; board[r1][c1]=board[r2][c2]; board[r2][c2]=t; }
function isAdjacent(r1,c1,r2,c2){ return Math.abs(r1-r2)+Math.abs(c1-c2)===1; }

// ============================================================
//  DOM / RENDER
// ============================================================
const boardEl = document.getElementById('board');

function renderBoard(){
  boardEl.innerHTML='';
  for(let r=0;r<BOARD_SIZE;r++){
    for(let c=0;c<BOARD_SIZE;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      const t=board[r][c];
      if(t>=0){ cell.textContent=TILES[t]; cell.dataset.type=t; }
      cell.dataset.r=r; cell.dataset.c=c;
      boardEl.appendChild(cell);
    }
  }
}

function getCell(r,c){ return boardEl.children[r*BOARD_SIZE+c]||null; }

function updateStats(){
  const diffNames=['简单','普通','困难'];
  const diffKeys=['easy','normal','hard'];
  document.getElementById('statLevel').textContent=`${diffNames[diffKeys.indexOf(difficulty)]}-${level+1}`;
  document.getElementById('statScore').textContent=score;
  document.getElementById('statSteps').textContent=stepsLeft;
  document.getElementById('statTarget').textContent=targetScore;
  const pct=Math.min(100,Math.round(score/targetScore*100));
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('targetText').textContent=`目标：${targetScore}分 · 还差${Math.max(0,targetScore-score)}分 ✨`;
}

// ============================================================
//  INPUT HANDLING — Pointer Events (mouse + touch unified)
// ============================================================
/*
  pointerdown  → record start cell & position
  pointermove  → if drag distance > threshold → swipe direction → attemptSwap
  pointerup    → if no swipe fired → click-select logic
  pointercancel→ cleanup
*/
const SWIPE_THRESHOLD = 10; // pixels before swipe triggers

let pDown       = false;
let pId         = null;
let pStartX     = 0, pStartY = 0;
let pCell       = null; // {r,c} of finger-down cell
let pSwiped     = false;

const boardWrap = document.getElementById('boardWrap');

boardWrap.addEventListener('pointerdown',  onPDown,  {passive:false});
boardWrap.addEventListener('pointermove',  onPMove,  {passive:false});
boardWrap.addEventListener('pointerup',    onPUp,    {passive:false});
boardWrap.addEventListener('pointercancel',onPCancel,{passive:false});

function cellAtPoint(x,y){
  // temporarily hide pointer-events on popups etc. so elementFromPoint hits a cell
  const el=document.elementFromPoint(x,y);
  if(!el) return null;
  const c=el.closest ? el.closest('.cell') : null;
  if(!c) return null;
  return {r:parseInt(c.dataset.r,10), c:parseInt(c.dataset.c,10)};
}

function onPDown(e){
  if(busy) return;
  e.preventDefault();
  if(pDown) return; // ignore extra fingers
  pDown=true; pId=e.pointerId; pSwiped=false;
  pStartX=e.clientX; pStartY=e.clientY;
  pCell=cellAtPoint(e.clientX,e.clientY);
  if(pCell){
    const el=getCell(pCell.r,pCell.c);
    if(el) el.classList.add('swiping');
  }
  try{ boardWrap.setPointerCapture(e.pointerId); }catch(_){}
}

function onPMove(e){
  if(!pDown || e.pointerId!==pId || pSwiped || busy) return;
  e.preventDefault();
  if(!pCell) return;
  const dx=e.clientX-pStartX, dy=e.clientY-pStartY;
  if(Math.hypot(dx,dy)<SWIPE_THRESHOLD) return;

  // determine swipe direction (4-way)
  let dr=0, dc=0;
  if(Math.abs(dx)>=Math.abs(dy)) dc=dx>0?1:-1;
  else dr=dy>0?1:-1;

  const nr=pCell.r+dr, nc=pCell.c+dc;
  if(nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE){
    // out of bounds — cancel
    pSwiped=true; clearSwipingClass(); return;
  }

  pSwiped=true;
  clearSwipingClass();
  // dismiss any click-selection
  if(selected){ const el=getCell(selected.r,selected.c); if(el) el.classList.remove('selected'); selected=null; }
  playClick();
  attemptSwap(pCell.r,pCell.c,nr,nc);
}

function onPUp(e){
  if(e.pointerId!==pId) return;
  clearSwipingClass();
  if(!pSwiped && pCell && !busy){
    handleClick(pCell.r,pCell.c);
  }
  resetPointer();
}

function onPCancel(e){
  if(e.pointerId!==pId) return;
  clearSwipingClass();
  resetPointer();
}

function resetPointer(){ pDown=false; pId=null; pCell=null; pSwiped=false; }
function clearSwipingClass(){ document.querySelectorAll('.cell.swiping').forEach(el=>el.classList.remove('swiping')); }

// Click-based selection (tap without drag)
function handleClick(r,c){
  if(busy) return;
  playClick();
  if(!selected){
    selected={r,c};
    const el=getCell(r,c); if(el) el.classList.add('selected');
  } else {
    const {r:sr,c:sc}=selected;
    const el=getCell(sr,sc); if(el) el.classList.remove('selected');
    if(sr===r&&sc===c){ selected=null; return; }
    selected=null;
    if(!isAdjacent(sr,sc,r,c)){
      // re-select the new cell
      selected={r,c};
      const nel=getCell(r,c); if(nel) nel.classList.add('selected');
      return;
    }
    attemptSwap(sr,sc,r,c);
  }
}

// ============================================================
//  SWAP + MATCH RESOLUTION
// ============================================================
async function attemptSwap(r1,c1,r2,c2){
  if(busy) return;
  busy=true;
  swapCells(r1,c1,r2,c2);
  const matches=findMatches();

  if(matches.length===0){
    // invalid — bounce back
    swapCells(r1,c1,r2,c2);
    const a=getCell(r1,c1), b=getCell(r2,c2);
    if(a) a.classList.add('invalid-swap');
    if(b) b.classList.add('invalid-swap');
    await wait(370);
    if(a) a.classList.remove('invalid-swap');
    if(b) b.classList.remove('invalid-swap');
    playFail();
    busy=false; return;
  }

  // Valid swap — count step + update display immediately
  stepsLeft--;
  comboCount=0;
  const a=getCell(r1,c1), b=getCell(r2,c2);
  if(a){ a.textContent=TILES[board[r1][c1]]; a.dataset.type=board[r1][c1]; }
  if(b){ b.textContent=TILES[board[r2][c2]]; b.dataset.type=board[r2][c2]; }

  await wait(80);
  await resolveMatches();
  updateStats();
  checkGameEnd();
  busy=false;
}

async function resolveMatches(){
  const matches=findMatches();
  if(matches.length===0) return;
  comboCount++;

  const groups=findGroups();
  let pts=0;
  groups.forEach(g=>{ pts+=SCORE_MAP[Math.min(g,6)]||SCORE_MAP[5]; });
  if(comboCount>1) pts=Math.floor(pts*1.3);
  score+=pts;

  // Popups
  const br=boardEl.getBoundingClientRect();
  const cx=br.left+br.width/2, cy=br.top+br.height*0.4;
  showScorePop(`+${pts}`,cx,cy);
  showLovePop(br);
  if(comboCount>=2) showComboPop(comboCount);
  groups.forEach(g=>{
    if(g>=5)     showSpecialPop('暴击喜欢！💥',br.left+br.width*0.3,br.top+70);
    else if(g===4) showSpecialPop('好甜！🍬',   br.left+br.width*0.55,br.top+90);
  });
  playMatch(Math.max(...groups));

  // Animate out matched cells
  matches.forEach(({r,c})=>{ const el=getCell(r,c); if(el) el.classList.add('eliminating'); });
  await wait(430);

  matches.forEach(({r,c})=>{ board[r][c]=-1; });
  applyGravity();

  renderBoard();
  boardEl.querySelectorAll('.cell').forEach(el=>el.classList.add('falling'));
  await wait(300);
  boardEl.querySelectorAll('.cell.falling').forEach(el=>el.classList.remove('falling'));

  updateStats();
  // Chain / cascade
  await resolveMatches();
}

// ============================================================
//  POPUP HELPERS
// ============================================================
function showLovePop(br){
  const msg=LOVE_MSGS[Math.floor(Math.random()*LOVE_MSGS.length)];
  const el=document.createElement('div');
  el.className='love-popup'; el.textContent=msg;
  // keep within viewport
  const leftMax=window.innerWidth-200;
  const leftMin=10;
  const left=Math.max(leftMin,Math.min(leftMax, br.left+20+Math.random()*(br.width-180)));
  const top=br.top+20+Math.random()*(br.height*0.55);
  el.style.left=left+'px'; el.style.top=top+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

function showScorePop(text,x,y){
  const el=document.createElement('div');
  el.className='score-pop'; el.textContent=text;
  el.style.left=x+'px'; el.style.top=y+'px';
  el.style.transform='translate(-50%,-50%)';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),960);
}

function showComboPop(n){
  const el=document.createElement('div');
  el.className='combo-pop';
  el.textContent=`连连心动！×${n} 💫`;
  el.style.left='50%'; el.style.top='38%';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1460);
}

function showSpecialPop(text,x,y){
  const el=document.createElement('div');
  el.className='combo-pop'; el.textContent=text;
  el.style.left=x+'px'; el.style.top=y+'px';
  el.style.transform='translate(-50%,-50%)';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1460);
}

// ============================================================
//  GAME FLOW
// ============================================================
function startGame(){
  const cfg=DIFF_CONFIG[difficulty];
  const lv=cfg.levels[level];
  stepsLeft=lv.steps; targetScore=lv.target;
  score=0; selected=null; busy=false; comboCount=0;
  clearSwipingClass(); resetPointer();
  initBoard();
  document.body.style.background=`var(${BG_VARS[level%BG_VARS.length]})`;
  showScreen('gameScreen');
  renderBoard();
  updateStats();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function checkGameEnd(){
  if(score>=targetScore){
    playWin();
    setTimeout(()=>{
      const cfg=DIFF_CONFIG[difficulty];
      if(level===cfg.levels.length-1) showFinalScreen();
      else showResultModal(true);
    },500);
  } else if(stepsLeft<=0){
    playFail();
    setTimeout(()=>showResultModal(false),500);
  }
}

function showResultModal(win){
  document.getElementById('resultEmoji').textContent=win?'🎉':'💔';
  document.getElementById('resultTitle').textContent=win?'通关成功！':'再接再厉！';
  document.getElementById('resultMsg').textContent=win
    ?'恭喜通关，你已经收获满屏喜欢！今天的郑雅雯，也被你甜到了。'
    :'差一点点，喜欢还差几格就满啦！再来一次，把郑雅雯的心动值消满吧！';
  document.getElementById('resultScore').textContent=score;
  document.getElementById('resultSteps').textContent=stepsLeft;
  const btns=document.getElementById('resultBtns');
  btns.innerHTML='';
  if(win){
    const b=document.createElement('button');
    b.className='mbtn primary'; b.textContent='💕 下一关';
    b.onclick=()=>{ closeModal(); level++; startGame(); };
    btns.appendChild(b);
  } else {
    const b=document.createElement('button');
    b.className='mbtn primary'; b.textContent='💪 再来一次';
    b.onclick=()=>{ closeModal(); startGame(); };
    btns.appendChild(b);
    const b2=document.createElement('button');
    b2.className='mbtn secondary'; b2.textContent='🏠 首页';
    b2.onclick=()=>{ closeModal(); goHome(); };
    btns.appendChild(b2);
  }
  document.getElementById('resultModal').classList.add('active');
}

function closeModal(){ document.getElementById('resultModal').classList.remove('active'); }

function showFinalScreen(){
  showScreen('finalScreen');
  spawnConfetti();
}

function spawnConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#ff6b9d','#ffd166','#06d6a0','#74b9ff','#c77dff','#ff9a3c'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    const s=7+Math.random()*10+'px'; el.style.width=s; el.style.height=s;
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    const dur=2+Math.random()*3;
    el.style.animationDuration=dur+'s';
    el.style.animationDelay=Math.random()*2+'s';
    wrap.appendChild(el);
    setTimeout(()=>el.remove(),(dur+2)*1000);
  }
}

function goHome(){ level=0; score=0; showScreen('startScreen'); }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ============================================================
//  BUTTON EVENTS
// ============================================================
document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    difficulty=btn.dataset.diff;
    playClick();
  });
});
document.getElementById('startBtn').addEventListener('click',()=>{ level=0;score=0;playClick();startGame(); });
document.getElementById('restartBtn').addEventListener('click',()=>{ playClick();closeModal();startGame(); });
document.getElementById('homeBtn').addEventListener('click',()=>{ playClick();closeModal();goHome(); });
document.getElementById('soundBtn').addEventListener('click',()=>{
  soundOn=!soundOn;
  document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
});
document.getElementById('finalRestartBtn').addEventListener('click',()=>{ level=0;score=0;goHome(); });
document.getElementById('resultModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('resultModal')) closeModal();
});
</script>
